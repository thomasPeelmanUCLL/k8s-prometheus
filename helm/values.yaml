# kube-prometheus-stack Helm values
# https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

# Pin chart version or leave empty for latest
chartVersion: ""  # e.g. "69.3.0"

# =============================================================================
# GRAFANA
# =============================================================================
# Set to false if you're using the separate k8s-grafana repo
grafana:
  enabled: true
  adminPassword: ""  # leave empty for auto-generated

  persistence:
    enabled: true
    size: 5Gi

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      # Using Cloudflare DNS-01 issuer because euroclasstravel.com is proxied
      # through Cloudflare (orange cloud) — HTTP-01 would fail through the proxy
      cert-manager.io/cluster-issuer: letsencrypt-prod-cloudflare
    hosts:
      - grafana.euroclasstravel.com
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.euroclasstravel.com

  grafana.ini:
    server:
      root_url: https://grafana.euroclasstravel.com
    analytics:
      reporting_enabled: false

  # -- Dashboard providers: tells Grafana where to load dashboards from
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: "Kubernetes"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
        - name: cert-manager
          orgId: 1
          folder: "cert-manager"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/cert-manager

  # -- Dashboards auto-downloaded from grafana.com on deploy
  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      node-exporter-full:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      kubernetes-pods:
        gnetId: 6417
        revision: 1
        datasource: Prometheus
    cert-manager:
      cert-manager:
        gnetId: 20340
        revision: 1
        datasource: Prometheus

  # -- Extra Grafana config for cert-manager dashboard folder
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL

# =============================================================================
# PROMETHEUS
# =============================================================================
prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: "10GiB"

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    additionalScrapeConfigs:
      - job_name: cert-manager
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - cert-manager
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: cert-manager
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: tcp-prometheus-servicemonitor

  ingress:
    enabled: false
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod-cloudflare
    hosts:
      - prometheus.euroclasstravel.com
    tls:
      - secretName: prometheus-tls
        hosts:
          - prometheus.euroclasstravel.com

# =============================================================================
# ALERTMANAGER
# =============================================================================
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

  ingress:
    enabled: false
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod-cloudflare
    hosts:
      - alertmanager.euroclasstravel.com
    tls:
      - secretName: alertmanager-tls
        hosts:
          - alertmanager.euroclasstravel.com

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'null'
      routes:
        - matchers:
            - alertname = Watchdog
          receiver: 'null'
    receivers:
      - name: 'null'
      # Uncomment for Slack:
      # - name: slack
      #   slack_configs:
      #     - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
      #       channel: '#alerts'
      #       title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
      #       text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

# =============================================================================
# NODE EXPORTER
# =============================================================================
nodeExporter:
  enabled: true

# =============================================================================
# KUBE STATE METRICS
# =============================================================================
kubeStateMetrics:
  enabled: true

# =============================================================================
# RESOURCE LIMITS
# =============================================================================
prometheus-node-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
