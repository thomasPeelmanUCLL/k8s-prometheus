name: Check for kube-prometheus-stack updates

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 08:00 UTC
  workflow_dispatch: {}

jobs:
  check-update:
    name: Compare latest chart version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Add prometheus-community Helm repo
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Get latest chart version
        id: latest
        run: |
          LATEST=$(helm search repo prometheus-community/kube-prometheus-stack --output json | jq -r '.[0].version')
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Get current pinned version
        id: current
        run: |
          CURRENT=$(grep 'chartVersion:' helm/values.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Open PR if update available
        if: steps.latest.outputs.version != steps.current.outputs.version && steps.current.outputs.version != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump kube-prometheus-stack to ${{ steps.latest.outputs.version }}"
          branch: "chore/bump-kube-prometheus-stack-${{ steps.latest.outputs.version }}"
          title: "chore: bump kube-prometheus-stack to ${{ steps.latest.outputs.version }}"
          body: |
            ## kube-prometheus-stack update

            A new version of the kube-prometheus-stack Helm chart is available.

            | | Version |
            |---|---|
            | Current | `${{ steps.current.outputs.version }}` |
            | Latest  | `${{ steps.latest.outputs.version }}` |

            **Action required:** Review the [changelog](https://github.com/prometheus-community/helm-charts/releases) and merge this PR to update.

            > ⚠️ kube-prometheus-stack updates often include CRD changes. Check the upgrade notes before merging.
          labels: dependencies,helm

      - name: Report no update needed
        if: steps.latest.outputs.version == steps.current.outputs.version || steps.current.outputs.version == ''
        run: |
          echo "✅ kube-prometheus-stack is up to date (latest: ${{ steps.latest.outputs.version }}) or unpinned."
