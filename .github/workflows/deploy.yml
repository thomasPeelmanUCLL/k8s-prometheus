name: Deploy kube-prometheus-stack

on:
  push:
    branches:
      - main
    paths:
      - 'helm/values.yaml'
      - 'alerts/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'Chart version to deploy (leave blank for latest)'
        required: false
        default: ''

jobs:
  deploy:
    name: Helm deploy to Kubernetes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Add prometheus-community Helm repo
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Resolve chart version
        id: version
        run: |
          INPUT_VERSION="${{ github.event.inputs.chart_version }}"
          VALUES_VERSION=$(yq '.chartVersion' helm/values.yaml | tr -d '"')

          if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "null" ]; then
            echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
          elif [ -n "$VALUES_VERSION" ] && [ "$VALUES_VERSION" != "null" ] && [ "$VALUES_VERSION" != "\"\"" ]; then
            echo "version=$VALUES_VERSION" >> $GITHUB_OUTPUT
          else
            LATEST=$(helm search repo prometheus-community/kube-prometheus-stack --output json | jq -r '.[0].version')
            echo "version=$LATEST" >> $GITHUB_OUTPUT
          fi

      - name: Strip custom keys from values
        run: |
          yq 'del(.chartVersion)' helm/values.yaml > /tmp/helm-values.yaml

      - name: Deploy kube-prometheus-stack
        run: |
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --create-namespace \
            --version ${{ steps.version.outputs.version }} \
            -f /tmp/helm-values.yaml \
            --wait \
            --timeout 10m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/kube-prometheus-stack-grafana -n monitoring --timeout=120s
          kubectl rollout status deployment/kube-prometheus-stack-kube-state-metrics -n monitoring --timeout=120s
          kubectl rollout status deployment/kube-prometheus-stack-operator -n monitoring --timeout=120s
          echo "✅ kube-prometheus-stack deployed successfully"
          echo ""
          echo "=== Pods in monitoring namespace ==="
          kubectl get pods -n monitoring
